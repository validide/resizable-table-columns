version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: "cron"
      cronjob: "0 0 13 * *"
    groups:
      all:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 0 6 * *"
    groups:
      all:
        patterns:
          - "*"
